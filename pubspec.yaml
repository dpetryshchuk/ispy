name: ispy_ios
description: ispy — a local AI creature that witnesses your life.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^0.13.2
  camera: ^0.10.5
  exif: ^3.1.2
  geolocator: ^11.0.0
  geocoding: ^2.2.0
  path_provider: ^2.1.0
  path: ^1.9.0
  graphview: ^1.2.0
  image: ^4.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  liquid_glass_widgets: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
